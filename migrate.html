<!-- Run this in browser to migrate data to multi-tenant structure -->
<!DOCTYPE html>
<html>
<head><title>Migrate Firestore</title></head>
<body>
<h2>Firestore Migration to Multi-Tenant</h2>
<pre id="log">Starting migration...</pre>
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.9.1/firebase-app.js';
import { getFirestore, collection, doc, setDoc, getDocs } from 'https://www.gstatic.com/firebasejs/11.9.1/firebase-firestore.js';

const app = initializeApp({
  apiKey: "AIzaSyBpVt_4q2gp-0Ak06yP7ycez2O-f6_pnDs",
  authDomain: "rotary-club-of-amity-tvm.firebaseapp.com",
  projectId: "rotary-club-of-amity-tvm",
  storageBucket: "rotary-club-of-amity-tvm.firebasestorage.app",
  messagingSenderId: "962876194129",
  appId: "1:962876194129:web:c06ce844d38654bfdf2770"
});
const db = getFirestore(app);
const log = document.getElementById('log');
const L = (msg) => { log.textContent += '\n' + msg; console.log(msg); };

const CHAPTER_ID = 'amity-tvm';

async function migrateCollectionToSubcollection(colName) {
  L(`Migrating ${colName}...`);
  const snapshot = await getDocs(collection(db, colName));
  if (snapshot.empty) {
    L(`  No docs in ${colName}, skipping.`);
    return;
  }
  let count = 0;
  for (const document of snapshot.docs) {
    const newRef = doc(db, 'chapters', CHAPTER_ID, colName, document.id);
    await setDoc(newRef, document.data());
    count++;
  }
  L(`  ✅ Migrated ${count} docs to chapters/${CHAPTER_ID}/${colName}`);
}

async function migrateMembersToGlobalUsers() {
  L(`Migrating members to global users...`);
  const snapshot = await getDocs(collection(db, 'members'));
  if (snapshot.empty) {
    L(`  No members found!`);
    return;
  }
  let count = 0;
  for (const document of snapshot.docs) {
    const data = document.data();
    const newRef = doc(db, 'users', document.id);
    await setDoc(newRef, {
      ...data,
      chapterId: CHAPTER_ID,
      status: 'active',
      isSuperAdmin: false
    });
    count++;
  }
  L(`  ✅ Migrated ${count} members to global users collection.`);
}

async function main() {
  try {
    L('Creating chapter document...');
    await setDoc(doc(db, 'chapters', CHAPTER_ID), {
      name: 'Rotary Club of Amity Trivandrum',
      status: 'active',
      createdAt: new Date().toISOString()
    });
    L(`✅ Created chapter document: ${CHAPTER_ID}`);

    await migrateMembersToGlobalUsers();

    const collections = [
      'events', 'attendance', 'payments', 'payment_edits',
      'announcements', 'tasks', 'projectNotes', 'minutes', 'opinions', 'members'
    ];

    for (const col of collections) {
      await migrateCollectionToSubcollection(col);
    }
    L('\n🎉 MIGRATION COMPLETE! Original root collections were NOT deleted.');
  } catch (err) {
    L('❌ ERROR: ' + err.message);
  }
}

main();
</script>
</body>
</html>
